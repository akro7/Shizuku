name: Build Shizuku

on:
  push:
    branches: [ master, main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Clone Shizuku-API
        run: |
          rm -rf api
          git clone --depth=1 https://github.com/RikkaApps/Shizuku-API.git api

      - name: Fetch Native External Submodules
        run: |
          EXT=native/jni/external

          clone_if_empty() {
            local dir="$EXT/$1"
            local url="$2"
            if [ -z "$(ls -A "$dir" 2>/dev/null)" ]; then
              echo "Cloning $1..."
              git clone --depth=1 "$url" "$dir"
            else
              echo "Already present: $1"
            fi
          }

          clone_if_empty "dtc"      "https://github.com/dgibson/dtc.git"
          clone_if_empty "lz4"      "https://github.com/lz4/lz4.git"
          clone_if_empty "xz"       "https://github.com/tukaani-project/xz.git"
          clone_if_empty "selinux"  "https://github.com/SELinuxProject/selinux.git"
          clone_if_empty "pcre"     "https://github.com/PCRE2Project/pcre2.git"
          clone_if_empty "xhook"    "https://github.com/iqiyi/xHook.git"
          clone_if_empty "zopfli"   "https://github.com/google/zopfli.git"

          echo "All external submodules ready"

      - name: Patch Shizuku-API for AGP Compatibility
        run: |
          find api -name "*.gradle" -o -name "*.gradle.kts" | while read f; do
            if grep -q "dev.rikka.tools.refine" "$f" 2>/dev/null; then
              sed -i "/id[[:space:]]*(['\"]dev\.rikka\.tools\.refine['\"])/d" "$f"
              echo "Removed refine plugin from: $f"
            fi
          done
          echo "All API compatibility patches applied"

      - name: Patch API Version to V14
        run: |
          FILE="api/shared/src/main/java/rikka/shizuku/ShizukuApiConstants.java"
          if [ -f "$FILE" ]; then
            sed -i 's/\(public static final int SERVER_VERSION = \)[0-9]*/\114/' "$FILE"
            sed -i 's/\(public static final int SERVER_PATCH_VERSION = \)[0-9]*/\10/' "$FILE"
            grep -E "SERVER_VERSION|SERVER_PATCH_VERSION" "$FILE"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Accept Android SDK Licenses
        run: |
          LICENSES_DIR="$ANDROID_HOME/licenses"
          mkdir -p "$LICENSES_DIR"
          echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > "$LICENSES_DIR/android-sdk-license"
          echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> "$LICENSES_DIR/android-sdk-license"
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> "$LICENSES_DIR/android-sdk-license"
          echo "84831b9409646a918e30573bab4c9c91346d8abd" > "$LICENSES_DIR/android-sdk-preview-license"
          echo "504667f4c0de7af1a06de9f4b1727b84351f2910" > "$LICENSES_DIR/android-googletv-license"
          echo "33b6a2b64607f11b759f320ef9dff4ae5c47d97a" > "$LICENSES_DIR/google-gdk-license"
          echo "e9acab5b5fbb560a72cfaecce8946896ff6aab9d" > "$LICENSES_DIR/mips-android-sysimage-license"

      - name: Install SDK Components
        run: |
          SDKMANAGER="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          $SDKMANAGER "build-tools;36.0.0" "platforms;android-36" "ndk;29.0.13113456"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          dependency-graph: generate-and-submit
          build-scan-publish: true
          build-scan-terms-of-use-url: "https://gradle.com/terms-of-service"
          build-scan-terms-of-use-agree: "yes"

      - name: Create Debug Keystore
        run: |
          mkdir -p "$HOME/.android"
          keytool -genkeypair -v \
            -keystore "$HOME/.android/debug.keystore" \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "Debug keystore created"

      - name: Build APK
        id: build
        run: |
          cat >> gradle.properties <<'PROPS'
          android.native.buildOutput=verbose
          org.gradle.caching=true
          org.gradle.parallel=true
          org.gradle.daemon=false
          PROPS

          ./gradlew :manager:assembleDebug --stacktrace 2>&1 | tee build_output.txt
          EXIT_CODE=${PIPESTATUS[0]}

          if [ $EXIT_CODE -ne 0 ]; then
            echo "========== BUILD ERROR SUMMARY =========="
            grep -A 30 "What went wrong" build_output.txt || true
            grep "ERROR:" build_output.txt | head -20 || true
            echo "========================================="
            exit $EXIT_CODE
          fi

          DEBUG_APK=$(ls manager/build/outputs/apk/debug/*.apk 2>/dev/null | head -1)
          BUILD_NAME=$([ -n "$DEBUG_APK" ] && basename "$DEBUG_APK" .apk || echo "shizuku-debug")
          echo "build_name=$BUILD_NAME" >> $GITHUB_OUTPUT
          echo "apk_path=$DEBUG_APK" >> $GITHUB_OUTPUT

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-log
          path: build_output.txt
          retention-days: 7

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.build.outputs.build_name }}
          path: manager/build/outputs/apk/debug/
          compression-level: 9
          retention-days: 30

      - name: Extract release tag
        if: startsWith(github.ref, 'refs/tags/v')
        id: tag
        run: echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          name: "Shizuku ${{ steps.tag.outputs.version }}"
          body: |
            ## What's new in ${{ steps.tag.outputs.version }}
            See commit history for full changes.
            Download APK below and install. Allow unknown sources if prompted.
          draft: false
          prerelease: false
          files: ${{ steps.build.outputs.apk_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
